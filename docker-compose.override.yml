# Development-only overrides for docker-compose.yml
# Provides hot-reload and convenient access for local development
# Run: docker-compose -f docker-compose.yml -f docker-compose.override.yml up

services:
  api:
    # Mount source code for live reload
    volumes:
      - .:/app
      - /app/__pycache__

    # Enable reloader for development
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

    # Expose for debugging (optional)
    environment:
      LOG_LEVEL: DEBUG
