name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black isort

      - name: Lint with ruff
        run: |
          echo "Linting with ruff..."
          ruff check app/ tests/ --show-source || true

      - name: Format check with black
        run: |
          echo "Checking formatting with black..."
          black --check app/ tests/ || true

      - name: Import sort check
        run: |
          echo "Checking import ordering with isort..."
          isort --check-only app/ tests/ || true

  arch-audit:
    name: Architecture Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run architecture audit
        run: |
          chmod +x scripts/arch_audit.py
          python scripts/arch_audit.py

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: munqith_test
          POSTGRES_USER: munqith
          POSTGRES_PASSWORD: munqith
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://munqith:munqith@localhost:5432/munqith_test
        run: |
          pip install alembic
          alembic upgrade head

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://munqith:munqith@localhost:5432/munqith_test
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml || exit 1

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, arch-audit, tests, build]
    if: always()
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint job failed"
            exit 1
          fi
          if [ "${{ needs.arch-audit.result }}" != "success" ]; then
            echo "Architecture audit failed"
            exit 1
          fi
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Docker build failed"
            exit 1
          fi
          echo "✓ All CI checks passed"
