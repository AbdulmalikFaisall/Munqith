# Production-ready Docker Compose for Munqith
# One-command deployment: docker-compose up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: munqith_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-munqith}
      POSTGRES_USER: ${DB_USER:-munqith}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-munqith}
      # Security: ensure password is changed in production
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-munqith}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - munqith_network
    # Security: restrict to internal network only
    expose:
      - "5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: munqith_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-munqith}:${DB_PASSWORD:-munqith}@postgres:5432/${DB_NAME:-munqith}
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - munqith_network
    # Run migrations and start app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # Production: remove volumes
    # Development: uncomment for live reload
    # volumes:
    #   - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        MUNQITH_API_BASE_URL: http://api:8000
    container_name: munqith_frontend
    environment:
      MUNQITH_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_DEV_BYPASS_AUTH: "false"
      AUTH_COOKIE_SECURE: "false"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - munqith_network

volumes:
  postgres_data:
    driver: local

networks:
  munqith_network:
    driver: bridge
